  <title>MillyFam Real Trading Cockpit v5</title>
  <style>
    :root {
      --bg:#080d14; --panel:#111821; --line:#263342; --text:#f3f7ff; --muted:#9aacbf; --cyan:#34d5ff;
      --green:#27d667; --orange:#d98519; --red:#c43d3d; --purple:#8144aa; --blue:#2794bb;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Consolas, "Segoe UI", system-ui, sans-serif; overflow:hidden; }
    .app { display:grid; grid-template-columns:310px 1fr; height:100vh; }
    .side { border-right:1px solid var(--line); background:#0c1219; overflow:hidden; display:flex; flex-direction:column; }
    .topbar { height:72px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; padding:14px; }
    .topbar label { color:#b6c7dc; font-size:13px; }
    .search { background:#151e27; border:1px solid var(--line); color:var(--text); padding:9px 10px; width:96px; outline:none; }
    .go { background:#4ccfff; color:#001018; border:0; padding:10px 18px; font-weight:800; cursor:pointer; }
    .side-title { display:flex; align-items:center; justify-content:space-between; padding:16px 14px 10px; color:var(--cyan); font-weight:900; font-size:20px; letter-spacing:.04em; }
    .refresh { font-size:12px; color:var(--muted); }
    .list { overflow:auto; padding:0 0 20px; }
    .ticker-card { padding:13px 14px; border-top:1px solid #1d2733; border-bottom:1px solid #05080c; cursor:pointer; background:#101720; }
    .ticker-card:hover, .ticker-card.active { background:#12324a; outline:1px solid #48cfff; }
    .row1 { display:flex; justify-content:space-between; align-items:center; gap:10px; }
    .sym { color:var(--cyan); font-size:21px; font-weight:900; letter-spacing:.03em; }
    .pct { color:var(--green); font-size:18px; font-weight:900; }
    .mini { margin-top:7px; display:flex; justify-content:space-between; color:#d5e8ff; font-size:12px; }
    .submini { margin-top:6px; color:#9aacbf; font-size:11px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .risk-pill { font-size:10px; padding:4px 10px; font-weight:900; color:white; }
    .risk-low { background:#288b61; } .risk-medium { background:#b46d12; } .risk-high { background:#af3434; } .risk-unknown { background:#56606d; }
    .main { overflow:auto; padding:22px 26px 40px; }
    .brand { text-align:right; color:#b9c6d9; font-size:14px; margin-bottom:18px; }
    .nav { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
    .nav a { color:#9ee6ff; text-decoration:none; border:1px solid var(--line); padding:6px 10px; border-radius:4px; background:#111821; }
    .hero { border:1px solid var(--line); background:#111821; padding:22px; display:flex; justify-content:space-between; gap:20px; align-items:flex-start; }
    .ticker-big { color:var(--cyan); font-size:44px; line-height:1; font-weight:300; }
    .facts { margin-top:22px; color:#d8e8f6; font-size:15px; }
    .badges { display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }
    .big-badge { padding:14px 20px; font-weight:900; color:white; min-width:150px; text-align:center; }
    .history { background:#a93232; }
    .riskbox-low { background:#2c8a5e; } .riskbox-medium { background:#b66c10; } .riskbox-high { background:#b13b3b; } .riskbox-unknown { background:#58616d; }
    .grid { display:grid; grid-template-columns:minmax(0,1.15fr) minmax(360px,.85fr); gap:20px; margin-top:16px; }
    .panel { border:1px solid var(--line); background:var(--panel); }
    .panel h3 { margin:0; padding:16px 20px; color:var(--cyan); border-bottom:1px solid var(--line); font-size:20px; }
    .panel-body { padding:16px 20px; }
    .timeline { display:grid; gap:6px; }
    .event { display:grid; grid-template-columns:70px 1fr; background:#1a232d; border-left:8px solid var(--blue); min-height:80px; }
    .event.sec { border-left-color:var(--orange); } .event.grok { border-left-color:var(--purple); }
    .event .tag { display:flex; align-items:center; justify-content:center; color:white; font-size:12px; font-weight:900; }
    .event .copy { padding:12px 14px; line-height:1.45; }
    .event .time { color:#9ac3e6; font-size:13px; margin-bottom:6px; }
    .risk-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px 28px; text-align:center; }
    .risk-k { color:#9dc0db; font-size:13px; margin-bottom:8px; }
    .risk-v { display:inline-block; padding:9px 18px; color:white; font-weight:900; }
    .offering-lines { line-height:1.75; font-size:15px; }
    .green { color:#33df74; } .red { color:#ff7777; }
    .zone-read { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
    .zone { padding:8px 12px; font-weight:900; border:1px solid var(--line); }
    .zone-prime,.zone-green,.rr-good,.rr-great { background:#1f6f4b; }
    .zone-prime { box-shadow:0 0 18px rgba(39,214,103,.26); }
    .zone-yellow,.rr-fair { background:#876b17; }
    .zone-red,.rr-poor { background:#8a2525; }
    .zone-gray { background:#4d5864; }
    .action-tradeable { background:#138a4c; box-shadow:0 0 18px rgba(39,214,103,.28); }
    .action-confirm { background:#1f5f8f; box-shadow:0 0 18px rgba(80,160,255,.28); }
    .action-watch { background:#876b17; }
    .action-pullback { background:#8a6617; }
    .action-avoid { background:#8a2525; }
    .action-block { background:#9b2d2d; box-shadow:0 0 18px rgba(196,61,61,.24); }
    .quality-a { background:#168f57; }
    .quality-b { background:#876b17; }
    .quality-c { background:#4d5864; }
    .shift-up { background:#137a45; }
    .shift-flat { background:#4d5864; }
    .shift-down { background:#8a2525; }
    .delta-box { margin-top:12px; padding:10px 12px; border-left:4px solid #34d5ff; background:rgba(52,213,255,.07); color:#dff8ff; line-height:1.55; }
    .timing-box { margin-top:12px; padding:10px 12px; border-left:4px solid #27d667; background:rgba(39,214,103,.07); color:#eafff2; line-height:1.55; }
    .warning-box { margin-top:12px; padding:10px 12px; border-left:4px solid #ffd166; background:rgba(245,200,75,.08); color:#ffd166; line-height:1.5; }
    .detail-list { margin:0; padding-left:18px; line-height:1.6; color:#e4efff; }
    .muted { color:var(--muted); }
    @media (max-width:1050px) {
      body { overflow:auto; }
      .app { grid-template-columns:1fr; height:auto; }
      .side { height:520px; }
      .grid { grid-template-columns:1fr; }
      .hero { flex-direction:column; }
      .badges { justify-content:flex-start; }
    }
  </style>

  let invalid = "INVALIDATION: Loss of VWAP + volume fade = exit";

    stop = "STOP: Below pullback shelf";
    invalid = "INVALIDATION: Lower high + volume fades";
  } else if (trig.includes("VOL")) {

    invalid = "INVALIDATION: Volume dries up under VWAP";
  }

  if (zone === "RED" || zone === "GRAY") {

  }

function parseHumanNumber(v) {
  const raw = String(v || "0").replaceAll(",", "").replace("$", "").trim().toUpperCase();
  if (!raw || raw === "UNKNOWN" || raw === "N/A") return 0;
  const mult = raw.endsWith("B") ? 1e9 : raw.endsWith("M") ? 1e6 : raw.endsWith("K") ? 1e3 : 1;
  const num = parseFloat(raw.replace(/[KMB]$/, ""));
  return Number.isFinite(num) ? num * mult : 0;
}

      text: "First visible alert for this ticker in current ledger window.",
      bullets: ["No prior row to compare yet."]
    };
  }

  const pctDelta = deltaPct(r.pct_raw, prev.pct_raw);
  const qrvDelta = deltaPct(r.qual_rvol_raw, prev.qual_rvol_raw);
  const dvolDelta = deltaPct(r.dollar_vol_raw, prev.dollar_vol_raw);

  let improve = 0;
  let weaken = 0;
  const bullets = [];

  if (pctDelta > 3) { improve++; bullets.push(`% change improving +${pctDelta.toFixed(1)} pts`); }
  else if (pctDelta < -3) { weaken++; bullets.push(`% change fading ${pctDelta.toFixed(1)} pts`); }
  else bullets.push(`% change mostly flat (${pctDelta.toFixed(1)} pts)`);

  if (qrvDelta > 25) { improve++; bullets.push(`qRVOL accelerating +${qrvDelta.toFixed(1)}`); }
  else if (qrvDelta < -25) { weaken++; bullets.push(`qRVOL fading ${qrvDelta.toFixed(1)}`); }
  else bullets.push(`qRVOL stable (${qrvDelta.toFixed(1)})`);

  if (dvolDelta > 250000) { improve++; bullets.push(`$Vol expanding +${humanVol(dvolDelta)}`); }
  else if (dvolDelta < -250000) { weaken++; bullets.push(`$Vol lower ${humanVol(dvolDelta)}`); }
  else bullets.push(`$Vol stable (${humanVol(dvolDelta)})`);

  if (improve >= 2) {
    return { label: "IMPROVING", cls: "shift-up", text: "Momentum profile is improving versus prior alert.", bullets };
  }
  if (weaken >= 2) {
    return { label: "WEAKENING", cls: "shift-down", text: "Momentum profile is weakening versus prior alert.", bullets };
  }
  return { label: "STABLE", cls: "shift-flat", text: "Momentum is stable versus prior alert.", bullets };
}
function humanVol(v) {
  const sign = v < 0 ? "-" : "";
  const n = Math.abs(Number(v || 0));
  if (n >= 1e9) return sign + (n/1e9).toFixed(2) + "B";
  if (n >= 1e6) return sign + (n/1e6).toFixed(2) + "M";
  if (n >= 1e3) return sign + (n/1e3).toFixed(2) + "K";
  return sign + n.toFixed(0);
}

function entryTiming(r, decision, shift) {
  const trigger = String(r.trigger || "").toUpperCase();
  const session = String(r.session || "").toUpperCase();
  const zone = String(r.zone_status || "").toUpperCase();
  const risk = String(r.risk_overall || "").toLowerCase();
  const action = String(decision.action || "").toUpperCase();
  const momentum = String(shift.label || "").toUpperCase();

  let timing = "WAIT";
  let primary = "Wait for confirmation.";
  let secondary = "Avoid random entries.";
  let invalid = "Invalid if price loses VWAP and volume fades.";
  let style = "zone-gray";

  if (action.includes("RISK BLOCK")) {
    return {
      timing: "NO ENTRY",
      style: "action-block",
      primary: "No planned entry while risk block is active.",
      secondary: "Only observe tape; do not chase.",
      invalid: "Invalid until dilution/offering risk or tape context improves."
    };
  }

  if (action.includes("RTH CONFIRM")) {
    timing = "RTH CONFIRM";
    style = "action-confirm";
    primary = "Mark levels now; wait for RTH spread/liquidity confirmation.";
    secondary = "First valid entry is VWAP reclaim or clean base break during RTH.";
    invalid = "Invalid if open rejects VWAP or volume dries up.";
  } else if (trigger.includes("EXTENSION")) {
    timing = "PULLBACK ONLY";
    style = "action-pullback";
    primary = "Do not chase. Wait for first controlled pullback into VWAP/support shelf.";
    secondary = "Entry only after higher-low forms and reclaim candle confirms.";
    invalid = "Invalid if pullback slices through VWAP/support without reclaim.";
  } else if (trigger.includes("HOD")) {
    timing = "BREAKOUT TRIGGER";
    style = "action-tradeable";
    primary = "Entry on clean HOD break with volume expansion.";
    secondary = "Better entry is first retest/hold of breakout level.";
    invalid = "Invalid if HOD break fails and price loses breakout base.";
  } else if (trigger.includes("NEWS") || trigger.includes("SEC")) {
    timing = "VWAP / NEWS-HIGH";
    style = "action-tradeable";
    primary = "Entry on VWAP reclaim or break/hold above news-spike high.";
    secondary = "If extended, wait for base above VWAP instead of chasing.";
    invalid = "Invalid if news pop fades below VWAP.";
  } else if (trigger.includes("VOL")) {
    timing = "VWAP / BASE BREAK";
    style = "action-watch";
    primary = "Entry on VWAP reclaim or tight consolidation break.";
    secondary = "Needs volume expansion on trigger candle.";
    invalid = "Invalid if base breaks down or volume fades.";
  }

  if (momentum === "WEAKENING") {
    timing = timing + " — CAUTION";
    secondary = secondary + " Momentum is weakening; require stronger confirmation.";
  } else if (momentum === "IMPROVING" && !action.includes("RISK BLOCK")) {
    secondary = secondary + " Momentum improving; keep on active watch.";
  }

  if (zone === "RED" || zone === "GRAY" || risk === "high") {
    if (!action.includes("TRADEABLE") && !action.includes("RTH CONFIRM")) {
      timing = "WAIT";
      style = "action-watch";
      primary = "Wait for structure to improve before planning an entry.";
      secondary = "Current risk/zone stack is not clean enough.";
      invalid = "Invalid until risk stack or chart structure improves.";
    }
  }

  if (session === "AH" || session === "PM") {
    invalid = invalid + " Confirm again during RTH before acting.";
  }

  return { timing, style, primary, secondary, invalid };
}


function eventRows(r) {
  const rows = [];
  rows.push(`<div class="event"><div class="tag">NEWS</div><div class="copy"><div class="time">${esc(r.date_display)} ${esc(r.time_display)}</div><strong>${esc(r.news_summary || "No news summary available yet.")}</strong></div></div>`);
  if (has(r.sec_url) || has(r.offering_url)) {
    const link = has(r.sec_url) ? r.sec_url : r.offering_url;
    rows.push(`<div class="event sec"><div class="tag">SEC</div><div class="copy"><div class="time">Filing / offering reference</div><a style="color:#9ee6ff" target="_blank" href="${esc(link)}">Open filing/source</a></div></div>`);
  } else {
    rows.push(`<div class="event sec"><div class="tag">SEC</div><div class="copy"><div class="time">Filing / offering reference</div>No direct SEC link in ledger.</div></div>`);
  }
  rows.push(`<div class="event grok"><div class="tag">READ</div><div class="copy"><div class="time">Trade-zone interpretation</div>${esc(r.zone_reason || "Needs stronger catalyst, volume, or risk profile.")}</div></div>`);
  return rows.join("");
}
function pctNum(r) {
  const n = parseFloat(String(r.pct_display || "0").replace("%", ""));
  return Number.isFinite(n) ? n : -999999;
}
function tsNum(r) {
  const raw = `${r.date_display || ""} ${r.time_display || ""}`;
  const t = Date.parse(raw.replaceAll("/", "-"));
  return Number.isFinite(t) ? t : 0;
}
function renderList() {
  const bestByTicker = new Map();

  [...ROWS]
    .sort((a, b) => {
      const p = pctNum(b) - pctNum(a);
      if (Math.abs(p) > 0.0001) return p;
      return tsNum(b) - tsNum(a);
    })
    .forEach(r => {
      if (!bestByTicker.has(r.ticker)) bestByTicker.set(r.ticker, r);
    });

  const rows = [...bestByTicker.values()].slice(0, 80);

  document.getElementById("tickerList").innerHTML = rows.map(r => `
    <div class="ticker-card" data-key="${esc(r.row_key)}" data-symbol="${esc(r.ticker)}">
      <div class="row1"><span class="sym">${esc(r.ticker)}</span><span class="pct">${esc(r.pct_display)}</span></div>
      <div class="mini"><span>${esc(r.price_display)} <small>${esc(r.exchange)}</small></span><span>Vol ${esc(r.session_vol_display)}</span></div>
      <div class="submini">${esc(fmtLine([r.float_display, r.market_cap_display, r.sector, r.country]))}</div>
      <div style="margin-top:8px"><span class="risk-pill ${clsRisk(r.risk_overall)}">${esc(r.risk_overall)}</span></div>
    </div>`).join("");
  document.querySelectorAll(".ticker-card").forEach(el => el.onclick = () => selectRow(el.dataset.key));
}

function pill(txt, cls) { return `<span class="zone ${cls}">${esc(txt)}</span>`; }
function renderDetail(r) {
  if (!r) { document.getElementById("detail").innerHTML = `<div class="panel"><div class="panel-body muted">No dashboard rows yet.</div></div>`; return; }
  document.querySelectorAll(".ticker-card").forEach(el => el.classList.toggle("active", el.dataset.key === r.row_key));
  const shellCap = has(r.offering_ability) ? r.offering_ability : "Unknown";
  const noAtm = String(r.atm_status || "").toLowerCase().includes("no") || !has(r.atm_status);
  const noS1 = !has(r.sec_url) && !has(r.offering_url);
  const noEquity = !String(r.offering_ability || "").toLowerCase().includes("high");
  const zoneReasons = (r.zone_reason_list && r.zone_reason_list.length) ? r.zone_reason_list : [r.zone_reason];
  const cautions = (r.zone_caution_list && r.zone_caution_list.length) ? r.zone_caution_list : [r.zone_caution];
  const tradePlan = tradePlanText(r);
  const decision = tradeDecision(r);
  const zoneAdj = adjustedZone(r);
  const shift = momentumShift(r);
  const timing = entryTiming(r, decision, shift);
  document.getElementById("detail").innerHTML = `
    <div class="hero">
      <div>
        <div class="ticker-big">${esc(r.ticker)}</div>
        <div class="facts">${esc(fmtLine(["Float/OS: " + r.float_display + "/" + r.outstanding_display, "MC: " + r.market_cap_display, r.sector, r.country]))}</div>
      </div>
      <div class="badges">
        <div class="big-badge history">${esc(historyText(r))}</div>
        <div class="big-badge ${clsRisk(r.risk_overall, "riskbox")}">RISK: ${esc(r.risk_overall)}</div>
      </div>
    </div>
    <div class="grid">
      <div>
        <section class="panel"><div class="panel-body"><div class="timeline">${eventRows(r)}</div></div></section>
        <section class="panel" style="margin-top:16px"><div class="panel-body">
          <div class="risk-grid">
            <div><div class="risk-k">Overall Risk</div><div class="risk-v ${clsRisk(r.risk_overall)}">${esc(r.risk_overall)}</div></div>
            <div><div class="risk-k">Offering</div><div class="risk-v ${clsRisk(r.risk_offer)}">${esc(r.risk_offer)}</div></div>
            <div><div class="risk-k">Dilution</div><div class="risk-v ${clsRisk(r.risk_dil)}">${esc(r.risk_dil)}</div></div>
            <div><div class="risk-k">Frequency</div><div class="risk-v risk-low">${esc(r.recent_off && r.recent_off !== "Unknown" ? r.recent_off : "Low")}</div></div>
            <div><div class="risk-k">Cash Need</div><div class="risk-v ${clsRisk(r.cash_need)}">${esc(r.cash_need)}</div></div>
            <div><div class="risk-k">Warrants</div><div class="risk-v ${clsRisk(r.risk_warrant)}">${esc(r.risk_warrant)}</div></div>
          </div>
        </div></section>
        <section class="panel" style="margin-top:16px"><h3>Offering Ability</h3><div class="panel-body offering-lines">
          <div class="${String(shellCap).toLowerCase() === "high" ? "red" : "green"}">Shelf Capacity / Offering Ability: ${esc(shellCap)}</div>
          <div>${noAtm ? "No ATM" : "ATM Status: " + esc(r.atm_status)}</div>
          <div>${noEquity ? "No Equity Line" : "Equity / shelf risk requires review"}</div>
          <div>${noS1 ? "No S-1 Offering link in ledger" : "SEC/offering link available"}</div>
        </div></section>
      </div>
      <div>
        <section class="panel"><h3>Trade Zone</h3><div class="panel-body">
          <div class="zone-read">
            ${pill(decision.action, decision.cls)}
            ${pill("Quality " + decision.quality, decision.qcls)}
            ${decision.action === "RISK BLOCK" ? pill("⚠ " + zoneAdj.status + " (Blocked)", "zone-gray") : pill(zoneAdj.status + " Zone", zoneAdj.cls)}
            ${pill("Momentum " + shift.label, shift.cls)}
            ${pill("Entry " + timing.timing, timing.style)}
            ${pill("R:R " + r.rr_quality, r.rr_class)}
            ${pill("Setup " + r.trade_setup_score, "zone-gray")}
          </div>
          ${zoneAdj.note ? `<div class="warning-box">⚠ ${esc(zoneAdj.note)}</div>` : ""}
          <ul class="detail-list">${zoneReasons.map(x => `<li>${esc(x)}</li>`).join("")}</ul>
          <div style="margin-top:14px" class="muted">Caution</div>
          <ul class="detail-list">${cautions.map(x => `<li>${esc(x)}</li>`).join("")}</ul>
          <div class="timing-box">
            <strong>Entry Timing:</strong> ${esc(timing.timing)}
            <ul class="detail-list" style="margin-top:8px">
              <li>${esc(timing.primary)}</li>
              <li>${esc(timing.secondary)}</li>
              <li>${esc(timing.invalid)}</li>
            </ul>
          </div>
          <div style="margin-top:14px" class="muted">Execution Plan</div>
          <ul class="detail-list">${tradePlan.map(x => `<li>${esc(x)}</li>`).join("")}</ul>
          ${decision.warning ? `<div class="warning-box">⚠ ${esc(decision.warning)}</div>` : ""}
          <div class="delta-box">
            <strong>Momentum Shift:</strong> ${esc(shift.text)}
            <ul class="detail-list" style="margin-top:8px">${shift.bullets.map(x => `<li>${esc(x)}</li>`).join("")}</ul>
          </div>
        </div></section>
        <section class="panel" style="margin-top:16px"><h3>Borrow / Squeeze</h3><div class="panel-body offering-lines">
          <div>SI % Float: <strong>${esc(r.si_pct_display)}</strong></div><div>CTB: <strong>${esc(r.ctb_display)}</strong></div>
          <div>HTB: <strong>${esc(r.htb_label)}</strong></div><div>Available: <strong>${esc(r.available_display)}</strong></div><div>Reg SHO: <strong>${esc(r.regsho)}</strong></div>
        </div></section>
        <section class="panel" style="margin-top:16px"><h3>Company Facts</h3><div class="panel-body offering-lines">
          <div>Exchange: <strong>${esc(r.exchange)}</strong></div><div>Industry: <strong>${esc(r.industry)}</strong></div>
          <div>Session: <strong>${esc(r.session)}</strong></div><div>$Vol: <strong>${esc(r.dollar_vol_display)}</strong></div><div>qRVOL: <strong>${esc(r.qual_rvol_display)}</strong></div>
        </div></section>
      </div>
    </div>`;
}
function selectRow(key) { renderDetail(ROWMAP[key] || ROWS[0]); }
document.getElementById("goBtn").onclick = () => {
  const q = document.getElementById("searchBox").value.trim().toUpperCase();
  const found = ROWS.find(r => r.ticker === q);
  if (found) selectRow(found.row_key);
};
document.getElementById("searchBox").addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("goBtn").click(); });
renderList();
selectRow(DEFAULT_KEY || (ROWS[0] && ROWS[0].row_key));
</script>
